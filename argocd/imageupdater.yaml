apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: tp-cicd-updater
  namespace: argocd
spec:
  commonUpdateSettings:
    updateStrategy: semver
    allowTags: "regexp:^[0-9]+\\.[0-9]+\\.[0-9]+$"
    ignoreTags:
      - latest
    pullSecret: "secret:argocd/ghcr-secret"
  writeBackConfig:
    method: "git:secret:argocd/git-creds"
    gitConfig:
      repository: "https://github.com/kilbertusrobin/tp-cicd"
      branch: "main"
      writeBackTarget: "helmvalues:helm/values.yaml"
  applicationRefs:
    - namePattern: "tp-cicd"
      images:
        - alias: tp-cicd
          imageName: "ghcr.io/kilbertusrobin/tp-cicd:0.0.2"
          manifestTargets:
            helm:
              tag: "image.tag"
