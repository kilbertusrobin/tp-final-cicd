apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tp-cicd
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: tp-cicd=ghcr.io/kilbertusrobin/tp-cicd
    argocd-image-updater.argoproj.io/tp-cicd.update-strategy: semver
    argocd-image-updater.argoproj.io/tp-cicd.allow-tags: regexp:^[0-9]+\.[0-9]+\.[0-9]+$
    argocd-image-updater.argoproj.io/tp-cicd.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/tp-cicd.helm.image-tag: image.tag
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  project: default
  source:
    repoURL: https://github.com/kilbertusrobin/tp-final-cicd
    targetRevision: main
    path: helm
  destination:
    server: https://kubernetes.default.svc
    namespace: tp-cicd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
